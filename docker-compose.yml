services:
  surrealdb:
    image: surrealdb/surrealdb:latest
    container_name: jarvis-surrealdb
    restart: unless-stopped
    entrypoint:
      - /surreal
      - start
      - --bind
      - 0.0.0.0:8000
      - --user
      - ${SURREAL_USER:-jarvis}
      - --pass
      - ${SURREAL_PASS:-memory}
      - --log
      - info
      - rocksdb:///data
    ports:
      - "8000:8000"
    volumes:
      - ./data/surrealdb:/data
    healthcheck:
      test: ["CMD", "/surreal", "isready", "--endpoint", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 5
