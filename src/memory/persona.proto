syntax = "proto3";

package src.memory;

import "google/protobuf/timestamp.proto";

// 统一的教育经历定义
message Education {
  enum Degree {
    DEGREE_UNSPECIFIED = 0;
    BACHELOR = 1;
    MASTER = 2;
    PHD = 3;
    POSTDOC = 4;
  }
  Degree degree = 1;
  string major = 2;
  string institution = 3;
  int32 start_year = 4;
  int32 end_year = 5;
  string mentor_name = 6; // 专门为老贾这种有大牛导师的人设计
}

// 地理位置信息
message Location {
  string city = 1;
  string country_code = 2; // ISO 3166-1 alpha-2
  string timezone = 3;
}

message FactMetadata {
  enum SourceType {
    SOURCE_UNSPECIFIED = 0;
    EXPLICIT_USER_STATEMENT = 1; // 用户直接说的：“我喜欢 Python”
    IMPLICIT_INFERENCE = 2;      // AI 推断的：用户一直在写 Python 代码
    THIRD_PARTY_EXTENSIONS = 3;  // 来自 Gmail/Calendar 等插件
  }
  
  SourceType source = 1;
  google.protobuf.Timestamp created_at = 2;
  google.protobuf.Timestamp last_verified_at = 3;
  float confidence_score = 4;    // 0.0 到 1.0，推断类记忆需要这个分值
  string original_chat_id = 5;   // 溯源：哪次聊天产生的？
}


message UserPersona {
  string user_id = 1;
  
  // 1. 基础信息
  message Demographics {
    string preferred_name = 1;
    Location home_location = 2;
    repeated Education education_history = 3;
    FactMetadata meta = 4;
  }
  Demographics demographics = 2;

  // 2. 偏好设置
  message Preferences {
    repeated string languages = 1;
    map<string, string> coding_preferences = 2; // key: "ide", value: "VS Code"
    repeated string dietary_restrictions = 3;
    FactMetadata meta = 4;
  }
  Preferences preferences = 3;

  // 3. 工作与专业背景
  message WorkContext {
    message Experience {
      string title = 1;
      string organization = 2;
      bool is_current = 3;
      string description = 4;
    }
    repeated Experience roles = 1;
    repeated string expertise_tags = 2; // e.g., "Quant", "LLM", "Distributed Systems"
    FactMetadata meta = 4;
  }
  WorkContext work_context = 4;

  // 4. 财务/高净值画像 (针对老贾这种特殊用户)
  message FinancialProfile {
    string net_worth_bracket = 1;
    repeated string investment_interests = 2;
    FactMetadata meta = 3;
  }
  FinancialProfile financial_profile = 5;
}